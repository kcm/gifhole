# Run gifhole without a Python toolchain:
#
#   docker compose up -d
#   open http://127.0.0.1:8777
#
# The library is a bind mount rather than a named volume, so the GIFs stay
# ordinary files in a folder you can open in Finder. That is the whole premise
# of the app, and a named volume would hide them inside Docker.
services:
  gifhole:
    build: .
    # Bound to the host's loopback, not 0.0.0.0: there is no authentication in
    # gifhole, so it should not be reachable from the network.
    ports:
      - "127.0.0.1:8777:8777"
    volumes:
      - ./library:/library
    environment:
      GIFHOLE_ROOT: /library
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Passed through, not commented out: the README tells you to expose this
      # with `GIFHOLE_TOKEN=... docker compose up -d`, and a commented variable
      # made that command serve an unauthenticated library while looking
      # protected. Empty means no token, which is correct for the loopback
      # binding above. Set it before binding anywhere else.
      GIFHOLE_TOKEN: ${GIFHOLE_TOKEN:-}
      GIFHOLE_READ_TOKEN: ${GIFHOLE_READ_TOKEN:-}
      GIFHOLE_PUBLIC_READS: ${GIFHOLE_PUBLIC_READS:-}
    restart: unless-stopped
